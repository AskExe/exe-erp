-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Exe ERP">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Epilogue:wght@900&display=swap');
      .mark { font-family: 'Epilogue', 'Inter', system-ui, sans-serif; font-weight: 900; letter-spacing: 0.12em; }
    ]]></style>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="#0F0E1A"/>
  <text x="256" y="320" class="mark" font-size="160" fill="#F5D76E" text-anchor="middle">EXE</text>
</svg>
