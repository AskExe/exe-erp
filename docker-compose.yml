# ──────────────────────────────────────────────────────────────
# Exe ERP — Docker Compose (production)
# Connects to external exe-db (PostgreSQL) and redis
# ──────────────────────────────────────────────────────────────

services:
  # ── First-boot configurator (runs once, creates site) ──────
  exe-erp-configurator:
    build: .
    image: ghcr.io/askexe/exe-erp:v0.2.0-final8
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: ["echo", "Site configured successfully"]
    environment:
      DB_HOST: exe-db
      DB_PORT: "5432"
      DB_TYPE: postgres
      DB_NAME: exe_erp
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set a strong password (12+ chars, mixed case, numbers, special chars)}
      ADMIN_PASSWORD: ${ERP_ADMIN_PASSWORD:?ERP_ADMIN_PASSWORD is required — set a strong password (12+ chars, mixed case, numbers, special chars)}
      REDIS_CACHE: redis://redis:6379/3
      REDIS_QUEUE: redis://redis:6379/4
      REDIS_SOCKETIO: redis://redis:6379/5
      SITE_NAME: ${SITE_NAME:?SITE_NAME is required — set your ERP site domain (e.g. erp.acme.com). No localhost/AskExe default for production.}
      EXE_ERP_ADMIN_TOKEN: ${EXE_ERP_ADMIN_TOKEN:-}
      EXE_ADMIN_TOKEN: ${EXE_ADMIN_TOKEN:-}
      GOTRUE_URL: ${GOTRUE_URL:-}
      GOTRUE_ADMIN_TOKEN: ${GOTRUE_ADMIN_TOKEN:-}
    volumes:
      - erp-sites:/home/frappe/frappe-bench/sites
    networks:
      - exe-net
    restart: "no"

  # ── Gunicorn backend ───────────────────────────────────────
  exe-erp:
    build: .
    image: ghcr.io/askexe/exe-erp:v0.2.0-final8
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command:
      - gunicorn
      - --bind=0.0.0.0:8000
      - --workers=4
      - --timeout=120
      - --graceful-timeout=30
      - --worker-tmp-dir=/dev/shm
      - frappe.app:application
    environment:
      DB_HOST: exe-db
      DB_PORT: "5432"
      DB_TYPE: postgres
      DB_NAME: exe_erp
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set a strong password (12+ chars, mixed case, numbers, special chars)}
      REDIS_CACHE: redis://redis:6379/3
      REDIS_QUEUE: redis://redis:6379/4
      REDIS_SOCKETIO: redis://redis:6379/5
      SITE_NAME: ${SITE_NAME:?SITE_NAME is required — set your ERP site domain (e.g. erp.acme.com). No localhost/AskExe default for production.}
      EXE_ERP_ADMIN_TOKEN: ${EXE_ERP_ADMIN_TOKEN:-}
      EXE_ADMIN_TOKEN: ${EXE_ADMIN_TOKEN:-}
      GOTRUE_URL: ${GOTRUE_URL:-}
      GOTRUE_ADMIN_TOKEN: ${GOTRUE_ADMIN_TOKEN:-}
      # Raw-events landing pad (bug 12f4c334). When unset the exe_bridge fails
      # closed and visibly disables raw.raw_events emission instead of silently
      # guessing credentials. Set to the exedb bridge DSN to enable forwarding.
      EXE_BRIDGE_DATABASE_URL: ${EXE_BRIDGE_DATABASE_URL:-}
    ports:
      - "127.0.0.1:8069:8000"
    volumes:
      - erp-sites:/home/frappe/frappe-bench/sites
    networks:
      - exe-net
    depends_on:
      exe-erp-configurator:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/method/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Socket.io for realtime events ──────────────────────────
  exe-erp-websocket:
    build: .
    image: ghcr.io/askexe/exe-erp:v0.2.0-final8
    entrypoint: []
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    environment:
      REDIS_SOCKETIO: redis://redis:6379/5
      SITE_NAME: ${SITE_NAME:?SITE_NAME is required — set your ERP site domain (e.g. erp.acme.com). No localhost/AskExe default for production.}
    ports:
      - "127.0.0.1:9069:9000"
    volumes:
      - erp-sites:/home/frappe/frappe-bench/sites
    networks:
      - exe-net
    depends_on:
      exe-erp:
        condition: service_healthy
    restart: unless-stopped
    # Realtime socket.io server listens on 9000. A TCP connect proves the
    # node process is up and accepting connections (bug 790794e8 follow-up:
    # the websocket service previously crash-looped with no visible signal).
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"net\").connect(9000,\"127.0.0.1\").on(\"connect\",()=>process.exit(0)).on(\"error\",()=>process.exit(1))'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── RQ worker for background jobs ──────────────────────────
  exe-erp-queue:
    build: .
    image: ghcr.io/askexe/exe-erp:v0.2.0-final8
    entrypoint: []
    command:
      - bench
      - worker
      - --queue=default,short,long
    environment:
      DB_HOST: exe-db
      DB_PORT: "5432"
      DB_TYPE: postgres
      DB_NAME: exe_erp
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set a strong password (12+ chars, mixed case, numbers, special chars)}
      REDIS_CACHE: redis://redis:6379/3
      REDIS_QUEUE: redis://redis:6379/4
      REDIS_SOCKETIO: redis://redis:6379/5
      SITE_NAME: ${SITE_NAME:?SITE_NAME is required — set your ERP site domain (e.g. erp.acme.com). No localhost/AskExe default for production.}
      # Raw-events landing pad (bug 12f4c334) — background jobs/scheduled tasks
      # emit trace events; bridge fails closed + visible when this is unset.
      EXE_BRIDGE_DATABASE_URL: ${EXE_BRIDGE_DATABASE_URL:-}
    volumes:
      - erp-sites:/home/frappe/frappe-bench/sites
    networks:
      - exe-net
    depends_on:
      exe-erp:
        condition: service_healthy
    restart: unless-stopped
    # The RQ worker has no listening port; liveness = the worker process
    # is still running. Without this the container can wedge silently and
    # background jobs stop processing with no signal (bug 81a9b8ad).
    # Uses Python (guaranteed in the image) to scan /proc — no extra apt
    # deps (procps/pgrep are not installed in the slim base).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import glob;import sys;sys.exit(0 if any('worker' in open(f).read() for f in glob.glob('/proc/[0-9]*/cmdline')) else 1)\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frappe scheduler (cron-like background tasks) ──────────
  exe-erp-scheduler:
    build: .
    image: ghcr.io/askexe/exe-erp:v0.2.0-final8
    entrypoint: []
    command:
      - bench
      - schedule
    environment:
      DB_HOST: exe-db
      DB_PORT: "5432"
      DB_TYPE: postgres
      DB_NAME: exe_erp
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set a strong password (12+ chars, mixed case, numbers, special chars)}
      REDIS_CACHE: redis://redis:6379/3
      REDIS_QUEUE: redis://redis:6379/4
      REDIS_SOCKETIO: redis://redis:6379/5
      SITE_NAME: ${SITE_NAME:?SITE_NAME is required — set your ERP site domain (e.g. erp.acme.com). No localhost/AskExe default for production.}
      # Raw-events landing pad (bug 12f4c334) — background jobs/scheduled tasks
      # emit trace events; bridge fails closed + visible when this is unset.
      EXE_BRIDGE_DATABASE_URL: ${EXE_BRIDGE_DATABASE_URL:-}
    volumes:
      - erp-sites:/home/frappe/frappe-bench/sites
    networks:
      - exe-net
    depends_on:
      exe-erp:
        condition: service_healthy
    restart: unless-stopped
    # The scheduler has no listening port; liveness = the schedule process
    # is still running. Without this a stalled scheduler stops dispatching
    # cron jobs (enqueued_calls, daily/weekly tasks) silently (bug 81a9b8ad).
    # Uses Python (guaranteed in the image) to scan /proc — no extra apt
    # deps (procps/pgrep are not installed in the slim base).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import glob;import sys;sys.exit(0 if any('schedule' in open(f).read() for f in glob.glob('/proc/[0-9]*/cmdline')) else 1)\" 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

# ── Volumes ──────────────────────────────────────────────────
volumes:
  erp-sites:
    name: exe-erp-sites

# ── Networks ─────────────────────────────────────────────────
# Connect to existing exe-os network (exe-db + redis already running)
networks:
  exe-net:
    external: true
    name: exe-net
