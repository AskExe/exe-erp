name: Release stack image

on:
  push:
    tags:
      - 'v*.*.*'
      - 'stack-v*.*.*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  release-image:
    runs-on: [self-hosted, linux, x64]
    env:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate stack release contract
        id: release
        shell: bash
        run: |
          python -m json.tool stack.release.json >/dev/null
          python - <<'PY2' >> "$GITHUB_OUTPUT"
          import json
          rel = json.load(open('stack.release.json'))
          assert rel.get('version'), 'version required'
          # exe-erp uses components map, not top-level image
          components = rel.get('components', {})
          assert 'erp' in components, 'erp component required in components map'
          erp_image = components['erp']
          assert ':v' + rel['version'] in erp_image, f'erp image must use stack release tag: {erp_image}'
          health = rel.get('stackParticipation', {}).get('health', [])
          assert len(health) > 0, 'health checks required'
          print('stack_version=' + rel['version'])
          print('image=' + erp_image)
          PY2

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.release.outputs.image }}
            ghcr.io/askexe/exe-erp:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.stack_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify published image
        run: |
          docker manifest inspect "${{ steps.release.outputs.image }}" >/dev/null
          echo "Published and verified ${{ steps.release.outputs.image }}"
