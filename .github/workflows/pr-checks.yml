# ──────────────────────────────────────────────────────────────
# Exe ERP — PR checks
#
# Replaces the inherited Frappe CI (server/ui tests, linters,
# release/backport/label/lock workflows) which carried supply-chain
# and self-hosted runner-load risk (bug 10e980cb):
#   - tmate debug shells, scheduled jobs queueing for hours,
#     pull_request_target with write tokens, external dispatch,
#     unpinned third-party actions.
#
# PR checks now run the SAME deep CI suite that gates a release
# image publish (bug c2b86c39 — CI was too shallow). The shared
# suite lives in ci-checks.yml (workflow_call) so a release can
# never publish an image without passing exactly what a PR must.
# All actions are pinned to a full commit SHA.
# ──────────────────────────────────────────────────────────────
name: PR checks

on:
  pull_request:
  workflow_dispatch:

# Least-privilege: read-only, no packages/contents write.
permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI checks
    uses: ./.github/workflows/ci-checks.yml
    permissions:
      contents: read
